<script>
const C=document.getElementById('sc2'),ctx=C.getContext('2d');
const W=320,H=320,TILE=16;
const PLAYER=14;
const ENEMY=10;
const LOOT=10;
const SPEED_BASE=1.55;
const DASH_SPEED=5.0;
const DASH_TIME=180; // ms
const SPEED_BOOST_TIME=500; // "0.5 seconds"
const HIT_INVULN=550; // ms after respawn
const LS_BEST_LEVEL='swarmEscape.bestLevel';
const LS_MOST_LIVES='swarmEscape.mostLives';

let running=false,dead=false,frame,keys={};
let level=1;
let checkpointLevel=1;
let lives=1;
let mostLives=1;
let bestLevel=1;

let px,py,vx,vy;
let enemies=[];
let traps=[];
let loots=[];
let door=null;
let started=false;
let joyX=0, joyY=0;
let joyActive=false;
let joyPid=null;
let donateTimer=null;
let donateShown=false;

let dashCharges=0;
let speedUntil=0;
let invulnUntil=0;
let lastDashAt=0;
let dashDir=null; // 'up' | 'down'
let levelStartAt=0; // ms; when movement/enemies become active
let deathAnimAt=0;
let deathParticles=[];
let coin=null;
let coinCollected=false;
let exitWarnUntil=0;

const playDlg=document.getElementById('playdlg');
const playDlgTitle=document.getElementById('playdlgTitle');
const playDlgBody=document.getElementById('playdlgBody');
const playBtn=document.getElementById('playbtn');
const joyWrap=document.getElementById('joyWrap');
const joyKnob=document.getElementById('joyKnob');
const donateDlg=document.getElementById('donatedlg');
const donateClose=document.getElementById('donateclose');

function dark(){return window.matchMedia('(prefers-color-scheme:dark)').matches;}
function BG(){return dark()?'#111110':'#f8f8f6';}
function GRID(){return dark()?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)';}
function TXT(){return dark()?'rgba(255,255,255,0.92)':'rgba(0,0,0,0.86)';}

function clamp(n,a,b){return Math.max(a,Math.min(b,n));}
function rand(a,b){return a+Math.random()*(b-a);}
function randi(a,b){return Math.floor(rand(a,b+1));}
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function dist2(ax,ay,bx,by){const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;}

function mkCoin(){
  const size=12;
  const p=spawnPosAwayFromPlayer(95);
  return {x:clamp(p.x,10,W-10-size),y:clamp(p.y,10,H-10-size),w:size,h:size};
}

function loadHighs(){
  const bl=Number(localStorage.getItem(LS_BEST_LEVEL)||'1');
  const ml=Number(localStorage.getItem(LS_MOST_LIVES)||'1');
  bestLevel=Number.isFinite(bl)&&bl>0?bl:1;
  mostLives=Number.isFinite(ml)&&ml>0?ml:1;
}
function saveHighs(){
  localStorage.setItem(LS_BEST_LEVEL,String(bestLevel));
  localStorage.setItem(LS_MOST_LIVES,String(mostLives));
}
function hud(){
  document.getElementById('lvl').textContent=String(level);
  document.getElementById('liv').textContent=String(lives);
  document.getElementById('chk').textContent=String(checkpointLevel);
  document.getElementById('best').textContent=String(bestLevel);
  document.getElementById('mliv').textContent=String(mostLives);
}

function spawnPosAwayFromPlayer(minDist){
  for(let i=0;i<60;i++){
    const x=randi(12,W-12-ENEMY);
    const y=randi(12,H-12-ENEMY);
    if(dist2(x,y,px,py)>(minDist*minDist)) return {x,y};
  }
  return {x:randi(12,W-12-ENEMY),y:randi(12,H-12-ENEMY)};
}

function genDoor(){
  const edge=randi(0,3);
  const w=30,h=30;
  if(edge===0) return {x:randi(10,W-10-w), y:2, w, h, edge:'top'};
  if(edge===1) return {x:W-2-w, y:randi(10,H-10-h), w, h, edge:'right'};
  if(edge===2) return {x:randi(10,W-10-w), y:H-2-h, w, h, edge:'bottom'};
  return {x:2, y:randi(10,H-10-h), w, h, edge:'left'};
}

function genLevelDifficulty(lvl){
  // Random difficulty per level, but generally ramps up.
  const base=1+lvl*0.18;
  const roll=rand(0.85,1.35);
  const diff=base*roll;
  const enemyCount=randi(3,5); // 3..5 only
  const enemySpeed=clamp(0.75+diff*0.18, 0.75, 2.25);
  const trapCount=randi(2,4); // 2..4 only
  const lootCount=clamp(randi(2,4),2,5);
  // Lower levels have smaller chance of enemies/traps.
  // Early levels still feel lighter via fewer traps (chance) and slower enemies.
  const trapSpawnChance=clamp(0.15 + lvl*0.07, 0.15, 1.0);
  return {diff,enemyCount,enemySpeed,trapCount,lootCount,trapSpawnChance};
}

function mkEnemy(enemySpeed){
  const p=spawnPosAwayFromPlayer(120);
  return {x:p.x,y:p.y,vx:(Math.random()-0.5),vy:(Math.random()-0.5),speed:enemySpeed,alive:true};
}

function mkTrap(){
  const size=14;
  const p=spawnPosAwayFromPlayer(90);
  return {x:clamp(p.x,6,W-6-size),y:clamp(p.y,6,H-6-size),w:size,h:size};
}

function mkLoot(){
  // Weighted loot table.
  const table=[
    ['dash',  16],
    ['speed', 18],
    ['power', 10],
    ['bomb',   7],
    ['life',  10],
    ['checkpoint', 6],
  ];
  const total=table.reduce((a,[_k,w])=>a+w,0);
  let r=Math.random()*total;
  let type='speed';
  for(const [k,w] of table){ r-=w; if(r<=0){type=k; break;} }
  const p=spawnPosAwayFromPlayer(80);
  return {type,x:clamp(p.x,10,W-10-LOOT),y:clamp(p.y,10,H-10-LOOT),w:LOOT,h:LOOT};
}

function placeAvoid(makeRect, avoidRects, tries=120){
  for(let i=0;i<tries;i++){
    const r=makeRect();
    let ok=true;
    for(const a of avoidRects){
      if(rectsOverlap(r.x,r.y,r.w,r.h,a.x,a.y,a.w,a.h)){ ok=false; break; }
    }
    if(ok) return r;
  }
  return makeRect();
}

function startAtLevel(lvl){
  level=lvl;
  started=true;
  dead=false;
  vx=0;vy=0;
  px=W/2-PLAYER/2;py=H/2-PLAYER/2;
  dashCharges=0;
  speedUntil=0;
  invulnUntil=Date.now()+HIT_INVULN;
  levelStartAt=Date.now(); // no countdown for initial start
  buildLevel(level);
  hud();
  document.getElementById('smsg').textContent='';
  running=true;

  // Donate popup after 3 minutes (once per session).
  if(!donateShown && !donateTimer){
    donateTimer = setTimeout(() => {
      donateShown = true;
      donateTimer = null;
      if(donateDlg) donateDlg.style.display='flex';
    }, 180000);
  }
}

function buildLevel(lvl){
  const d=genLevelDifficulty(lvl);
  coinCollected=false;
  exitWarnUntil=0;

  // Door first, keep it away from player.
  const playerRect={x:px,y:py,w:PLAYER,h:PLAYER};
  door = placeAvoid(
    ()=>genDoor(),
    [playerRect],
    60
  );

  // Coin: must collect before exit works.
  coin = placeAvoid(
    ()=>mkCoin(),
    [playerRect, door],
    120
  );

  const avoid=[playerRect, door, coin];

  // Traps & loot avoid door/player and each other.
  traps=[];
  for(let i=0;i<d.trapCount;i++){
    if(Math.random()>d.trapSpawnChance) continue;
    const t=placeAvoid(()=>mkTrap(), avoid, 120);
    traps.push(t);
    avoid.push(t);
  }

  loots=[];
  for(let i=0;i<d.lootCount;i++){
    const L=placeAvoid(()=>mkLoot(), avoid, 120);
    loots.push(L);
    avoid.push(L);
  }

  // Enemies avoid door/player/traps/loot.
  enemies=[];
  for(let i=0;i<d.enemyCount;i++){
    const e=placeAvoid(
      ()=> {
        const en=mkEnemy(d.enemySpeed);
        return {x:en.x,y:en.y,w:ENEMY,h:ENEMY,_e:en};
      },
      avoid,
      120
    );
    enemies.push(e._e);
    avoid.push({x:e._e.x,y:e._e.y,w:ENEMY,h:ENEMY});
  }
}

function init(){
  loadHighs();
  level=1;
  checkpointLevel=1;
  lives=1;
  started=false;
  dashCharges=0;
  speedUntil=0;
  invulnUntil=0;
  deathAnimAt=0;
  deathParticles=[];
  coin=null;
  coinCollected=false;
  exitWarnUntil=0;
  dead=false;
  running=false;
  donateShown=false;
  if(donateTimer){ clearTimeout(donateTimer); donateTimer=null; }
  if(donateDlg) donateDlg.style.display='none';
  px=W/2-PLAYER/2;py=H/2-PLAYER/2;vx=0;vy=0;
  enemies=[];
  traps=[];
  loots=[];
  door=genDoor();
  hud();
  document.getElementById('smsg').textContent='press Enter to play · collect the coin, then reach EXIT';
  showPlayDialog('Swarm Escape','Press Enter to play.');
}

function moveEnemy(e){
  if(!e.alive) return;
  const cx=px+PLAYER/2,cy=py+PLAYER/2;
  const ex=e.x+ENEMY/2,ey=e.y+ENEMY/2;
  const dx=cx-ex,dy=cy-ey;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const ax=dx/dist*0.08;
  const ay=dy/dist*0.08;
  e.vx=(e.vx+ax);
  e.vy=(e.vy+ay);
  const sp=Math.sqrt(e.vx*e.vx+e.vy*e.vy)||1;
  const max=e.speed;
  if(sp>max){e.vx=e.vx/sp*max;e.vy=e.vy/sp*max;}
  e.x+=e.vx;
  e.y+=e.vy;
  e.x=clamp(e.x,0,W-ENEMY);
  e.y=clamp(e.y,0,H-ENEMY);
}

function consumeLoot(L){
  if(L.type==='dash'){
    dashCharges++;
  }else if(L.type==='speed'){
    speedUntil=Math.max(speedUntil, Date.now()+SPEED_BOOST_TIME);
  }else if(L.type==='power'){
    enemies.forEach(e=>e.alive=false);
  }else if(L.type==='bomb'){
    // If consume you will die.
    die('bomb');
    return;
  }else if(L.type==='life'){
    lives++;
    mostLives=Math.max(mostLives,lives);
    saveHighs();
  }else if(L.type==='checkpoint'){
    checkpointLevel=level;
  }
  hud();
}

function step(){
  if(!running)return;
  const now=Date.now();

  // 3-second counter before a new level starts (after using the exit).
  if(now < levelStartAt){
    draw();
    const left = Math.max(0, levelStartAt - now);
    const n = Math.max(1, Math.ceil(left/1000));
    ctx.fillStyle = dark() ? 'rgba(0,0,0,0.35)' : 'rgba(255,255,255,0.35)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = TXT();
    ctx.font = '48px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(n), W/2, H/2);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    return;
  }

  const spMul = now<speedUntil ? 1.55 : 1.0;
  const accel = 0.42*spMul;
  if(keys.ArrowLeft||keys.a)vx-=accel;
  if(keys.ArrowRight||keys.d)vx+=accel;
  if(keys.ArrowUp||keys.w)vy-=accel;
  if(keys.ArrowDown||keys.s)vy+=accel;
  if(joyActive){
    vx += joyX * accel;
    vy += joyY * accel;
  }

  // Dash: straight only choose if up or down.
  // Use Shift or Space. Direction is chosen by holding Up or Down.
  const wantsDash = (keys.Shift || keys[' '] || keys.Space);
  if(wantsDash && dashCharges>0 && (now-lastDashAt)>250){
    if(keys.ArrowUp||keys.w) dashDir='up';
    else if(keys.ArrowDown||keys.s) dashDir='down';
    else dashDir=null;
    if(dashDir){
      dashCharges--;
      lastDashAt=now;
      invulnUntil=Math.max(invulnUntil, now + DASH_TIME);
      vy = (dashDir==='up' ? -DASH_SPEED : DASH_SPEED);
      vx = 0;
      hud();
    }
  }

  const maxSp=SPEED_BASE*spMul;
  const spd=Math.sqrt(vx*vx+vy*vy)||1;
  if(spd>maxSp){vx=vx/spd*maxSp;vy=vy/spd*maxSp;}
  vx*=0.86;vy*=0.86;
  px=clamp(px+vx,0,W-PLAYER);
  py=clamp(py+vy,0,H-PLAYER);

  enemies.forEach(moveEnemy);

  // Trap collision (instant death).
  for(const t of traps){
    if(rectsOverlap(px,py,PLAYER,PLAYER,t.x,t.y,t.w,t.h)){
      die('trap');
      return;
    }
  }

  // Enemy collision (instant death) unless invulnerable.
  if(now>=invulnUntil){
    for(const e of enemies){
      if(!e.alive) continue;
      if(rectsOverlap(px,py,PLAYER,PLAYER,e.x,e.y,ENEMY,ENEMY)){
        die('enemy');
        return;
      }
    }
  }

  // Loot pickup
  for(let i=loots.length-1;i>=0;i--){
    const L=loots[i];
    if(rectsOverlap(px,py,PLAYER,PLAYER,L.x,L.y,L.w,L.h)){
      loots.splice(i,1);
      consumeLoot(L);
      if(dead) return;
    }
  }

  // Coin pickup (required to exit)
  if(coin && !coinCollected && rectsOverlap(px,py,PLAYER,PLAYER,coin.x,coin.y,coin.w,coin.h)){
    coinCollected=true;
    coin=null;
  }

  // Door tunnel to next level.
  if(door && rectsOverlap(px,py,PLAYER,PLAYER,door.x,door.y,door.w,door.h)){
    if(!coinCollected){
      exitWarnUntil=now+1200;
    }else{
      nextLevel();
    }
    return;
  }

  // Update highs
  if(level>bestLevel){
    bestLevel=level;
    saveHighs();
    hud();
  }
  draw();
}

function nextLevel(){
  level++;
  if(level>bestLevel){bestLevel=level;saveHighs();}
  buildLevel(level);
  // Small reposition away from door to avoid immediate retrigger.
  px=W/2-PLAYER/2;py=H/2-PLAYER/2;vx=0;vy=0;
  invulnUntil=Date.now()+HIT_INVULN;
  levelStartAt=Date.now()+3000;
  hud();
  draw();
}

function die(reason){
  if(dead) return;
  dead=true;
  running=false;
  deathAnimAt=Date.now();
  deathParticles=[];
  const cx=px+PLAYER/2, cy=py+PLAYER/2;
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2;
    const sp=rand(0.6,2.6);
    deathParticles.push({
      x:cx,y:cy,
      vx:Math.cos(a)*sp,
      vy:Math.sin(a)*sp,
      r:rand(1.5,3.2)
    });
  }
  draw();

  const hadSpareLife = lives>1;
  if(hadSpareLife) lives--;
  else lives=0;
  hud();

  if(hadSpareLife){
    const msg = reason==='bomb' ? 'bomb consumed!' : 'you died!';
    document.getElementById('smsg').textContent=msg+' press Play to respawn';
    showPlayDialog('You died','Press Enter to respawn — or tap Play.');
    if(playBtn) playBtn.textContent='Respawn';
  }else{
    document.getElementById('smsg').textContent='game over · press Play to restart';
    showPlayDialog('Game Over','Press Enter to play again — or tap Play.');
    if(playBtn) playBtn.textContent='Play again';
  }
}

function draw(){
  ctx.fillStyle=BG();ctx.fillRect(0,0,W,H);
  ctx.fillStyle=GRID();
  for(let y=0;y<=H;y+=TILE)ctx.fillRect(0,y,W,1);
  for(let x=0;x<=W;x+=TILE)ctx.fillRect(x,0,1,H);
  // Door tunnel
  if(door){
    const locked = !coinCollected;
    ctx.fillStyle= locked
      ? (dark()?'rgba(120,98,210,0.08)':'rgba(98,76,202,0.05)')
      : (dark()?'rgba(120,98,210,0.16)':'rgba(98,76,202,0.10)');
    ctx.fillRect(door.x,door.y,door.w,door.h);
    ctx.strokeStyle= locked
      ? (dark()?'rgba(168,146,255,0.35)':'rgba(90,60,200,0.30)')
      : (dark()?'rgba(168,146,255,0.85)':'rgba(90,60,200,0.7)');
    ctx.lineWidth=2;
    ctx.strokeRect(door.x+1,door.y+1,door.w-2,door.h-2);
    ctx.lineWidth=1;
    ctx.fillStyle= locked
      ? (dark()?'rgba(168,146,255,0.55)':'rgba(90,60,200,0.45)')
      : (dark()?'rgba(168,146,255,0.85)':'rgba(90,60,200,0.7)');
    ctx.font='10px monospace';
    ctx.fillText(locked ? 'LOCK' : 'EXIT', door.x+6, door.y+18);
  }

  // Coin
  if(coin && !coinCollected){
    const cx=coin.x+coin.w/2, cy=coin.y+coin.h/2;
    ctx.fillStyle=dark()?'rgba(255,215,80,0.92)':'rgba(200,140,0,0.92)';
    ctx.beginPath();
    ctx.arc(cx,cy,coin.w/2,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle=dark()?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(cx,cy,coin.w/2-2,0,Math.PI*2);
    ctx.stroke();
  }

  // Traps
  for(const t of traps){
    ctx.fillStyle=dark()?'rgba(255,90,90,0.16)':'rgba(200,40,40,0.10)';
    ctx.fillRect(t.x,t.y,t.w,t.h);
    ctx.strokeStyle=dark()?'rgba(255,120,120,0.85)':'rgba(160,40,40,0.75)';
    ctx.strokeRect(t.x+0.5,t.y+0.5,t.w-1,t.h-1);
  }

  // Enemies
  for(const e of enemies){
    if(!e.alive) continue;
    ctx.fillStyle=dead ? '#5F5E5A' : '#D85A30';
    ctx.fillRect(e.x,e.y,ENEMY,ENEMY);
  }

  // Loot
  for(const L of loots){
    let col = '#2AA198';
    if(L.type==='bomb') col = '#DC322F';
    if(L.type==='life') col = '#859900';
    if(L.type==='checkpoint') col = '#B58900';
    if(L.type==='power') col = '#6C71C4';
    if(L.type==='dash') col = '#268BD2';
    if(L.type==='speed') col = '#2AA198';
    ctx.fillStyle=col;
    ctx.fillRect(L.x,L.y,L.w,L.h);
    ctx.fillStyle=dark()?'rgba(0,0,0,0.35)':'rgba(255,255,255,0.35)';
    ctx.fillRect(L.x+2,L.y+2,L.w-4,L.h-4);
  }

  // Player
  const now=Date.now();
  const inv = now<invulnUntil;
  ctx.fillStyle=dead ? '#888780' : (inv ? 'rgba(24,95,165,0.55)' : '#185FA5');
  ctx.fillRect(px,py,PLAYER,PLAYER);
  if(!dead){
    ctx.fillStyle= now<speedUntil ? 'rgba(42,161,152,0.20)' : 'rgba(24,95,165,0.18)';
    ctx.fillRect(px-3,py-3,PLAYER+6,PLAYER+6);
  }

  // HUD legend inside canvas
  ctx.fillStyle=TXT();
  ctx.font='11px monospace';
  const aliveEnemies=enemies.filter(e=>e.alive).length;
  const dashTxt = dashCharges>0 ? `dash:${dashCharges}` : '';
  const speedTxt = now<speedUntil ? 'speed' : '';
  const invTxt = inv ? 'safe' : '';
  const coinTxt = coinCollected ? 'coin' : 'no-coin';
  ctx.fillText(`enemies:${aliveEnemies} ${coinTxt} ${dashTxt} ${speedTxt} ${invTxt}`.trim(),8,16);

  // Exit warning dialog (small)
  if(exitWarnUntil && now<exitWarnUntil){
    const msg='Collect the coin first!';
    ctx.fillStyle=dark()?'rgba(0,0,0,0.55)':'rgba(255,255,255,0.65)';
    ctx.fillRect(10,H-34,W-20,22);
    ctx.strokeStyle=dark()?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.12)';
    ctx.strokeRect(10.5,H-33.5,W-21,21);
    ctx.fillStyle=TXT();
    ctx.font='12px monospace';
    ctx.fillText(msg, 18, H-18);
  }

  // Death animation (burst/fade)
  if(dead && deathAnimAt){
    const t=clamp((now-deathAnimAt)/650,0,1);
    for(const p of deathParticles){
      p.x+=p.vx; p.y+=p.vy;
      p.vx*=0.98; p.vy*=0.98;
      ctx.fillStyle=`rgba(216,90,48,${0.85*(1-t)})`;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*(1+0.6*t),0,Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle=`rgba(255,255,255,${0.16*(1-t)})`;
    ctx.fillRect(px-8,py-8,PLAYER+16,PLAYER+16);
  }
}

function showPlayDialog(title, body){
  playDlgTitle.textContent=title;
  playDlgBody.textContent=body;
  if(playBtn) playBtn.textContent='Play';
  playDlg.style.display='flex';
}
function hidePlayDialog(){
  playDlg.style.display='none';
}

function playEnter(){
  // Only Enter can start/restart/respawn.
  if(dead && lives===0){
    init();
    startAtLevel(1);
    hidePlayDialog();
    return;
  }
  if(!started){
    startAtLevel(1);
    hidePlayDialog();
    return;
  }
  if(dead && lives>0){
    startAtLevel(checkpointLevel);
    hidePlayDialog();
    return;
  }
  if(!running){
    running=true;
    hidePlayDialog();
  }
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Escape'){
    try{window.parent?.postMessage({type:'swarm-escape:close'}, window.location.origin);}catch{}
    return;
  }
  if(e.key==='Enter'){
    e.preventDefault();
    playEnter();
    return;
  }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    // Movement only (does not start the game).
    e.preventDefault();
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function dpad(dir,keydown){
  // Movement only (does not start the game).
  if(keydown){keys[dir]=true;}
  else keys[dir]=false;
}

['u2','d2','l2','r2'].forEach((id,i)=>{
  const dirs=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('mousedown',()=>dpad(dirs[i],true));
  el.addEventListener('mouseup',()=>dpad(dirs[i],false));
  el.addEventListener('touchstart',e=>{e.preventDefault();dpad(dirs[i],true);},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();dpad(dirs[i],false);},{passive:false});
});

// Virtual joystick for touch devices (tablet/mobile)
function setJoy(dx,dy,r){
  const mag=Math.sqrt(dx*dx+dy*dy) || 1;
  const clamped=Math.min(r, mag);
  const nx=dx/mag, ny=dy/mag;
  const ox=nx*clamped, oy=ny*clamped;
  if(joyKnob) joyKnob.style.transform = `translate(${ox}px, ${oy}px)`;
  joyX = ox / r;
  joyY = oy / r;
}
function resetJoy(){
  joyActive=false;
  joyPid=null;
  joyX=0; joyY=0;
  if(joyKnob) joyKnob.style.transform = 'translate(0px, 0px)';
}
if(joyWrap){
  const radius=42;
  const center=()=>{
    const rect=joyWrap.getBoundingClientRect();
    return {cx:rect.left + rect.width/2, cy:rect.top + rect.height/2};
  };
  joyWrap.addEventListener('pointerdown',(ev)=>{
    if(ev.pointerType==='mouse') return;
    joyWrap.setPointerCapture(ev.pointerId);
    joyPid=ev.pointerId;
    joyActive=true;
    const {cx,cy}=center();
    setJoy(ev.clientX-cx, ev.clientY-cy, radius);
  });
  joyWrap.addEventListener('pointermove',(ev)=>{
    if(!joyActive || joyPid!==ev.pointerId) return;
    const {cx,cy}=center();
    setJoy(ev.clientX-cx, ev.clientY-cy, radius);
  });
  joyWrap.addEventListener('pointerup',(ev)=>{
    if(joyPid!==ev.pointerId) return;
    resetJoy();
  });
  joyWrap.addEventListener('pointercancel',(ev)=>{
    if(joyPid!==ev.pointerId) return;
    resetJoy();
  });
}

// Tap-to-play for touch devices (no Enter key)
playDlg?.addEventListener('pointerdown',(ev)=>{
  if(ev.pointerType==='mouse') return;
  ev.preventDefault();
  playEnter();
});

// On-screen Play button (works on mobile too)
playBtn?.addEventListener('click',(ev)=>{
  ev.preventDefault();
  playEnter();
});

donateClose?.addEventListener('click',(ev)=>{
  ev.preventDefault();
  if(donateDlg) donateDlg.style.display='none';
});
donateDlg?.addEventListener('click',(ev)=>{
  if(ev.target === donateDlg){
    if(donateDlg) donateDlg.style.display='none';
  }
});

init();draw();
function gameLoop(){frame=requestAnimationFrame(gameLoop);step();}
gameLoop();
